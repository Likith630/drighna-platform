apiVersion: apps/v1
kind: Deployment
metadata:
  name: drighna-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drighna
  template:
    metadata:
      labels:
        app: drighna
    spec:
      containers:
      - name: drighna-container
        image: likith630/drighna-platform:latest
        ports:
        - containerPort: 3000